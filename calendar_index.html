<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>

    <link rel="stylesheet" href="projetoluisnassau\my-project\src\scss\calendar_style.css">
</head>
<body>

    <h1>Calendar</h1>

    <div class="calendar">
        <header>
            <h3></h3>

            <nav>
                <button id="prev" aria-label="Previous month"></button>
                <button id="next" aria-label="Next month"></button>
            </nav>
        </header>

        <section>
            <ul class="days">
                <li>Sun</li>
                <li>Mon</li>
                <li>Tue</li>
                <li>Wed</li>
                <li>Thu</li>
                <li>Fri</li>
                <li>Sat</li>
            </ul>

            <ul class="dates"></ul>
        </section>
    </div>

    <script src="projetoluisnassau\my-project\src\js\calendar_script.js" defer></script>

</body>
</html>
